<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Stack | SkyAware</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">SkyAware</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="features.html">Features</a></li>
                <li><a href="tech.html" class="active">Tech Stack</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="download.html" class="download-nav">Download</a></li>
            </ul>
        </div>
    </nav>

    <section id="tech" class="tech-stack">
        <div class="container" style="text-align: center;">
            <div class="section-header fade-in" style="align-items: center;">
                <h2 class="section-title">Built for Precision</h2>
                <p class="section-subtitle">Powered by modern engineering and cutting-edge APIs.</p>
            </div>
            <div class="tech-grid fade-in">
                <div class="tech-item">
                    <img src="tech-icon.png" width="20" height="20" alt="Flutter icon" class="tech-icon">
                    <span class="tech-name">Flutter</span>
                </div>
                <div class="tech-item">
                    <img src="icon_dart@2x.png" width="20" height="20" alt="Dart icon" class="tech-icon">
                    <span class="tech-name">Dart</span>
                </div>
                <div class="tech-item">
                    <img src="javascript-1.svg" width="20" height="20" alt="JavaScript icon" class="tech-icon">
                    <span class="tech-name">JavaScript</span>
                </div>
                <div class="tech-item">
                    <img src="gemini-color.svg" width="20" height="20" alt="Gemini API icon" class="tech-icon">
                    <span class="tech-name">Gemini API</span>
                </div>
                <div class="tech-item">
                    <img src="Logomark_Full Color.png" width="20" height="20" alt="Firebase icon" class="tech-icon">
                    <span class="tech-name">Firebase</span>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 SkyAware Project. Developed by an Aspiring Aviator.</p>
        </div>
    </footer>

    <!-- Modal Structure -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <button id="modal-close" class="modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Back
                </button>
                <div class="modal-image-placeholder">
                    <img id="modal-image" src="" alt="Technology Visualization">
                </div>
            </div>
            <div class="modal-details">
                <h2 id="modal-title"></h2>
                <div id="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
